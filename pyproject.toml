[project]
name = "finetuning"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "torch==2.9.1",
    "transformers",
    "datasets",
    "pyyaml",
    "vllm",
    "wandb",
    "python-dotenv>=1.2.2",
    "huggingface_hub"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tasks", "scripts"]   # list each folder
